<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Claude Chat</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html {
    overflow: hidden;
    width: 100%;
    height: 100%;
    -webkit-text-size-adjust: 100%;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

#header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: #16213e;
    border-bottom: 1px solid #2a2a4a;
}

#header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #c4b5fd;
}

#header .right {
    display: flex;
    align-items: center;
    gap: 12px;
}

#usage-display {
    font-size: 12px;
    color: #8a8aaa;
    font-variant-numeric: tabular-nums;
}
#usage-display .ok   { color: #4ade80; }
#usage-display .warn { color: #facc15; }
#usage-display .over { color: #f87171; }

#new-btn {
    padding: 6px 14px;
    background: #2a2a4a;
    color: #c4b5fd;
    border: 1px solid #3a3a5a;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
}

#new-btn:hover { background: #3a3a5a; }

#status-btn {
    padding: 6px 14px;
    background: #2a2a4a;
    color: #8a8aaa;
    border: 1px solid #3a3a5a;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
}
#status-btn:hover { background: #3a3a5a; }
#status-btn:disabled { opacity: 0.5; cursor: default; }

.model-btn {
    padding: 6px 14px;
    background: #2a2a4a;
    color: #8a8aaa;
    border: 1px solid #3a3a5a;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
}
.model-btn:hover { background: #3a3a5a; }
.model-btn.active { background: #3a3a5a; color: #c4b5fd; border-color: #c4b5fd; }

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 15px;
    overflow-wrap: break-word;
    word-break: break-word;
    min-width: 0;
}

.message.user {
    align-self: flex-end;
    background: #3730a3;
    color: #e0e0ff;
    border-bottom-right-radius: 4px;
    white-space: pre-wrap;
}

.message.assistant {
    align-self: flex-start;
    background: #222244;
    border: 1px solid #2a2a4a;
    border-bottom-left-radius: 4px;
}

.message.assistant.interrupted {
    border-color: #4a3a2a;
}

.message.assistant p { margin-bottom: 8px; }
.message.assistant p:last-child { margin-bottom: 0; }
.message.assistant pre {
    background: #0d1117;
    border-radius: 6px;
    padding: 12px;
    overflow-x: auto;
    margin: 8px 0;
    max-width: 100%;
}
.message.assistant code {
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
}
.message.assistant :not(pre) > code {
    background: #2a2a4a;
    padding: 2px 6px;
    border-radius: 3px;
}

.interrupted-label {
    font-size: 11px;
    color: #b89a6a;
    margin-top: 8px;
    font-style: italic;
}

#status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 20px;
    background: #0f1729;
    border-top: 1px solid #2a2a4a;
    font-size: 11px;
    color: #555;
    flex-shrink: 0;
    transition: background 0.3s, color 0.3s;
    min-height: 24px;
}

#status-bar.warn {
    background: #2a1a00;
    color: #f0c040;
    border-top-color: #5a3a00;
}

#status-bar.over {
    background: #2a0000;
    color: #ff6b6b;
    border-top-color: #6a0000;
    animation: overagePulse 2s ease infinite;
}

@keyframes overagePulse {
    0%, 100% { background: #2a0000; }
    50% { background: #400000; }
}

#input-area {
    padding: 16px 20px;
    background: #16213e;
    border-top: 1px solid #2a2a4a;
    display: flex;
    gap: 10px;
}

#input {
    flex: 1;
    padding: 12px 16px;
    background: #1a1a2e;
    color: #e0e0e0;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    font-family: inherit;
    font-size: 16px;
    resize: none;
    min-height: 48px;
    max-height: 200px;
    outline: none;
}

#input:focus { border-color: #c4b5fd; }

#send-btn {
    padding: 12px 24px;
    background: #5b21b6;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    align-self: flex-end;
}

#send-btn:hover { background: #6d28d9; }

#tts-btn {
    padding: 12px 14px;
    background: #2a2a4a;
    color: #c4b5fd;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    align-self: flex-end;
    transition: background 0.2s;
    flex-shrink: 0;
}
#tts-btn:hover { background: #3a3a6a; }
#tts-btn.active { background: #1e3a5f; color: #60a5fa; }

.typing-wrap {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-top: 4px;
}

.typing-indicator {
    display: inline-block;
    flex-shrink: 0;
    width: 8px;
    height: 8px;
    background: #c4b5fd;
    border-radius: 50%;
    animation: pulse 1s infinite;
}

.tool-status {
    font-size: 12px;
    color: #8878c4;
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 280px;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
}

/* Mobile styles */
@media (max-width: 600px) {
    #header {
        padding: 10px 12px;
    }

    #header h1 {
        font-size: 16px;
    }

    #messages {
        padding: 12px 8px;
        gap: 12px;
    }

    .message {
        max-width: 92%;
        padding: 10px 12px;
        font-size: 14px;
        line-height: 1.5;
    }

    .message.assistant pre {
        padding: 8px;
        font-size: 12px;
    }

    .message.assistant code {
        font-size: 12px;
    }

    #status-bar {
        padding: 3px 12px;
        font-size: 10px;
    }

    #input-area {
        padding: 10px 8px;
        padding-bottom: max(10px, env(safe-area-inset-bottom));
        gap: 8px;
    }

    #input {
        padding: 10px 12px;
        font-size: 16px; /* prevents iOS zoom on focus */
    }

    #send-btn {
        padding: 10px 16px;
        font-size: 14px;
    }

    #new-btn {
        padding: 5px 10px;
        font-size: 12px;
    }

    #usage-display {
        font-size: 11px;
    }
}
</style>
</head>
<body>

<div id="header">
    <h1>Claude Chat</h1>
    <div class="right">
        <span id="usage-display"></span>
        <button id="status-btn" onclick="fetchUsage()">Status</button>
        <button class="model-btn{% if model == 'claude-sonnet-4-6' %} active{% endif %}" onclick="switchModel('sonnet')">Sonnet</button>
        <button class="model-btn{% if model != 'claude-sonnet-4-6' %} active{% endif %}" onclick="switchModel('opus')">Opus</button>
        <button id="new-btn" onclick="newChat()">New Chat</button>
    </div>
</div>

<div id="messages"></div>

<div id="status-bar">
    <span id="status-model">{{ model }}</span>
</div>

<div id="input-area">
    <textarea id="input" rows="1" placeholder="Message Claude..." onkeydown="handleKey(event)"></textarea>
    <button id="tts-btn" onclick="toggleTTS()" title="Read responses aloud">🔊</button>
    <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
marked.setOptions({
    highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
            return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
    },
    breaks: true
});

const messagesEl = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');

function pctClass(p) {
    if (p >= 80) return 'over';
    if (p >= 50) return 'warn';
    return 'ok';
}

function pctSpan(label, p, resetIso) {
    if (p === undefined) return '';
    const cls = pctClass(p);
    let resetStr = '';
    if (resetIso) {
        const rt = new Date(resetIso);
        const now = new Date();
        if (rt > now) {
            const sameDay = rt.toDateString() === now.toDateString();
            if (sameDay) {
                resetStr = rt.toLocaleTimeString([], {hour: 'numeric', minute:'2-digit'});
            } else {
                resetStr = rt.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'})
                         + ' ' + rt.toLocaleTimeString([], {hour: 'numeric', minute:'2-digit'});
            }
            resetStr = ` <span style="color:#8a8aaa;font-size:12px">↻${resetStr}</span>`;
        }
    }
    return `${label} <span class="${cls}">${p}%</span>${resetStr}`;
}

async function fetchUsage() {
    const el = document.getElementById('usage-display');
    const btn = document.getElementById('status-btn');
    btn.disabled = true;
    btn.textContent = '…';
    try {
        const r = await fetch('/api/usage?fresh=1');
        const data = await r.json();
        if (data.error) { el.textContent = 'usage unavailable'; return; }
        const p = data.pcts || {};
        const rs = data.resets || {};
        const parts = [
            pctSpan('5h', p['session'], rs['session']),
            pctSpan('7d', p['week'], rs['week']),
            p['sonnet_week'] != null ? pctSpan('7d ✦', p['sonnet_week'], rs['sonnet_week']) : null,
        ].filter(Boolean);
        el.innerHTML = parts.join(' <span style="color:#444">·</span> ');
    } catch(e) {
        el.textContent = 'usage unavailable';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Status';
    }
}

async function switchModel(which) {
    const model = which === 'sonnet' ? 'claude-sonnet-4-6' : 'claude-opus-4-6';
    const r = await fetch('/api/model', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({model})
    });
    const data = await r.json();
    if (data.ok) {
        document.getElementById('status-model').textContent = data.model;
        document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
        const idx = which === 'sonnet' ? 0 : 1;
        document.querySelectorAll('.model-btn')[idx].classList.add('active');
        // Reset session so the new model isn't asked to resume a session from a different model
        if (currentReader) await interruptCurrent();
        await fetch('/new', { method: 'POST' });
        messagesEl.innerHTML = '';
        const notice = document.createElement('div');
        notice.style.cssText = 'text-align:center;color:#888;font-size:12px;margin:8px 0';
        notice.textContent = `↺ Switched to ${which === 'sonnet' ? 'Sonnet' : 'Opus'} — new session started`;
        messagesEl.appendChild(notice);
        scrollToBottom();
    }
}

let userScrolledUp = false;

// Current streaming state
let currentReader = null;
let currentAssistantDiv = null;
let currentFullText = '';

// Track if user has scrolled up
messagesEl.addEventListener('scroll', () => {
    const atBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 50;
    userScrolledUp = !atBottom;
});

function scrollToBottom() {
    if (!userScrolledUp) {
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }
}

// Auto-resize textarea
input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 200) + 'px';
});

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function addMessage(role, content) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (role === 'assistant') {
        div.innerHTML = marked.parse(content);
    } else {
        div.textContent = content;
    }
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
}

async function interruptCurrent() {
    // Mark current response as interrupted
    if (currentAssistantDiv) {
        const contentDiv = currentAssistantDiv.querySelector('div');
        const wrap = currentAssistantDiv.querySelector('.typing-wrap');
        if (wrap) wrap.remove();
        if (contentDiv && currentFullText) {
            contentDiv.innerHTML = marked.parse(currentFullText);
            currentAssistantDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        }
        currentAssistantDiv.classList.add('interrupted');
        const label = document.createElement('div');
        label.className = 'interrupted-label';
        label.textContent = '(interrupted)';
        currentAssistantDiv.appendChild(label);
    }

    // Cancel the current reader
    if (currentReader) {
        try { await currentReader.cancel(); } catch(e) {}
        currentReader = null;
    }

    // Tell the backend to kill the process
    try {
        await fetch('/interrupt', { method: 'POST' });
    } catch(e) {}

    currentAssistantDiv = null;
    currentFullText = '';
}

async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';

    // If Claude is currently responding, interrupt it
    if (currentReader) {
        await interruptCurrent();
    }

    addMessage('user', text);

    const assistantDiv = document.createElement('div');
    assistantDiv.className = 'message assistant';

    const contentDiv = document.createElement('div');
    const typingWrap = document.createElement('div');
    typingWrap.className = 'typing-wrap';
    const indicator = document.createElement('span');
    indicator.className = 'typing-indicator';
    const toolStatus = document.createElement('span');
    toolStatus.className = 'tool-status';
    typingWrap.appendChild(indicator);
    typingWrap.appendChild(toolStatus);

    assistantDiv.appendChild(contentDiv);
    assistantDiv.appendChild(typingWrap);
    messagesEl.appendChild(assistantDiv);
    scrollToBottom();

    currentAssistantDiv = assistantDiv;
    currentFullText = '';

    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        });

        const reader = response.body.getReader();
        currentReader = reader;
        const decoder = new TextDecoder();
        let buffer = '';
        let gotDone = false;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop();

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                try {
                    const event = JSON.parse(line.slice(6));
                    if (event.type === 'delta') {
                        toolStatus.textContent = '';
                        currentFullText += event.text;
                        contentDiv.innerHTML = marked.parse(currentFullText);
                        scrollToBottom();
                    } else if (event.type === 'tool_call') {
                        const icons = {Read:'📖',Write:'✏️',Edit:'✏️',Bash:'⚙️',Grep:'🔍',Glob:'🔍',Agent:'🤖',WebFetch:'🌐',WebSearch:'🌐',TodoWrite:'📋'};
                        const icon = icons[event.tool] || '🔧';
                        toolStatus.textContent = `${icon} ${event.tool}${event.summary ? ' · ' + event.summary : ''}`;
                        scrollToBottom();
                    } else if (event.type === 'tool_result') {
                        toolStatus.textContent = '';
                    } else if (event.type === 'model') {
                        document.getElementById('status-model').textContent = event.model;
                    } else if (event.type === 'done') {
                        gotDone = true;
                        speakText(currentFullText);
                    } else if (event.type === 'account_error') {
                        document.getElementById('usage-display').innerHTML = `<span class="over">⚠ LIMIT — ${event.message.slice(0, 80)}</span>`;
                    }
                } catch (e) {}
            }
        }

        // Final render
        if (currentAssistantDiv === assistantDiv) {
            typingWrap.remove();
            if (currentFullText) {
                contentDiv.innerHTML = marked.parse(currentFullText);
                if (!gotDone) {
                    const cut = document.createElement('div');
                    cut.style.cssText = 'font-size:11px;color:#f87171;margin-top:4px';
                    cut.textContent = '⚠ stream ended unexpectedly';
                    assistantDiv.appendChild(cut);
                }
            } else {
                contentDiv.innerHTML = '<em style="color:#888">No response</em>';
            }
            assistantDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
        }

    } catch (err) {
        if (currentAssistantDiv === assistantDiv) {
            typingWrap.remove();
            if (currentFullText) {
                contentDiv.innerHTML = marked.parse(currentFullText);
                assistantDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                const cut = document.createElement('div');
                cut.style.cssText = 'font-size:11px;color:#f87171;margin-top:4px';
                cut.textContent = `⚠ stream ended unexpectedly`;
                assistantDiv.appendChild(cut);
            } else {
                contentDiv.innerHTML = `<em style="color:#f87171">Error: ${err.message}</em>`;
            }
        }
    }

    // Clean up if this is still the active response
    if (currentAssistantDiv === assistantDiv) {
        currentReader = null;
        currentAssistantDiv = null;
        currentFullText = '';
    }

    scrollToBottom();
    input.focus();
}

async function newChat() {
    if (currentReader) {
        await interruptCurrent();
    }
    await fetch('/new', { method: 'POST' });
    messagesEl.innerHTML = '';
    input.focus();
}

input.focus();

// ===== TEXT TO SPEECH (voice output) =====
let ttsEnabled = false;

function toggleTTS() {
    ttsEnabled = !ttsEnabled;
    const btn = document.getElementById('tts-btn');
    btn.classList.toggle('active', ttsEnabled);
    btn.title = ttsEnabled ? 'Mute responses' : 'Read responses aloud';
    if (!ttsEnabled) window.speechSynthesis.cancel();
}

function speakText(text) {
    if (!ttsEnabled || !text) return;
    window.speechSynthesis.cancel();
    const plain = text
        .replace(/```[\s\S]*?```/g, 'code block.')
        .replace(/`[^`]+`/g, '')
        .replace(/#{1,6}\s/g, '')
        .replace(/\*\*/g, '').replace(/\*/g, '')
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
        .replace(/\n+/g, ' ').trim();
    const utt = new SpeechSynthesisUtterance(plain);
    utt.rate = 1.05;
    window.speechSynthesis.speak(utt);
}
</script>
</body>
</html>
